<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse | Gamer Social</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="animated-bg"></div>

    <header class="anime-nav">
        <div class="logo">ANIME<span>STATS</span></div>
        <div class="search-bar">探索 Search...</div>
    </header>

    <main class="main-grid">
        <aside class="char-card">
            <div class="rank-tag">S-RANK</div>
            <div class="avatar-wrapper">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Haruto" alt="Anime Avatar">
            </div>
            <h2 class="char-name">Haruto_Kun</h2>
            <div class="hp-bar"><div class="hp-fill"></div></div>
            <p class="bio">"O mundo é um jogo e eu sou o protagonista." 🎌</p>
            
            <div class="tags">
                <span class="tag">Isekai</span>
                <span class="tag">RPG</span>
            </div>
        </aside>

        <section class="feed">
            <article class="anime-post">
                <div class="post-header">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Sakura" class="mini-avatar">
                    <div class="user-info">
                        <h4>Sakura_Chan</h4>
                        <p>Power Level: 9001</p>
                    </div>
                </div>
                
                <div class="post-inner">
                    <p>Alguém ansioso para a nova season do anime de Solo Leveling? Os visuais estão insanos! 🔥🔥🔥</p>
                    <div class="post-graphic" style="background-image: url('https://images.unsplash.com/photo-1578632292335-df3abbb0d586?auto=format&fit=crop&q=80&w=600');">
                        <div class="overlay-text">NEW EPISODE</div>
                    </div>
                </div>

                <div class="post-footer">
                    <button class="btn-action pulse">❤️ ARIGATO</button>
                    <button class="btn-action">💬 SHARE</button>
                </div>
            </article>
        </section>
    </main>

</body>
</html>
